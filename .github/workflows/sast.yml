name: SAST and Security Gate

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config ./semgrep-local.yml \
            --config p/python \
            --config p/security-audit \
            --json \
            --output semgrep-report.json \
            .

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json

  security_gate:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Semgrep report
        uses: actions/download-artifact@v5
        with:
          name: semgrep-report
          path: .

      - name: Run Security Gate
        run: |
          python security_gate.py --semgrep semgrep-report.json --threshold ERROR
